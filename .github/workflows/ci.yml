name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

  # Integration tests need a reachable Postgres (DATABASE_URL). Enable when your repo wires a service container or secrets.
  # api-integration:
  #   runs-on: ubuntu-latest
  #   ...

  deploy:
    needs: [api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy placeholder
        run: |
          echo "Configure deploy: set secrets (e.g. FLY_API_TOKEN, RENDER_HOOK) and replace this step with your host’s deploy command."
